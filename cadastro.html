<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Clientes — demetrius&amp;co</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/pages.css">
</head>
<body class="cadastro-page">

  <div class="terminal-bar">
    <span>~/demetrius&amp;co/auth/cadastro</span>
    <span>form: novo_cliente</span>
  </div>

  <header class="site-header">
    <div class="container">
      <div class="brand">
        <img src="assets/logo.svg" alt="logo demetrius&amp;co" class="logo">
        <span class="tagline">Área do Cliente<br>Novo Cadastro</span>
      </div>
      <nav aria-label="principal">
        <a href="index.html">Home</a>
        <a href="login.html">Login</a>
      </nav>
    </div>
  </header>

  <main class="form-page">
    <section class="form-panel yg-panel" aria-labelledby="page-title">
      <div class="panel-head">
        <img src="assets/logo.svg" alt="logo demetrius&amp;co" class="logo">
        <h1 id="page-title">Cadastro de Clientes</h1>
        <p>preencha todos os campos</p>
      </div>

      <div class="panel-body">
        <form id="form-cadastro" novalidate>
          <div class="cadastro-grid">
            <div class="field full">
              <label for="email">E-mail (será seu login)</label>
              <input type="email" id="email" placeholder="voce@empresa.com.br">
            </div>

            <div class="field">
              <label for="senha">Senha</label>
              <input type="password" id="senha">
            </div>

            <div class="field">
              <label for="senha2">Confirmação de Senha</label>
              <input type="password" id="senha2">
            </div>

            <div class="field full">
              <label>Regras de composição da senha</label>
              <div id="rules" class="rules-box"></div>
            </div>

            <div class="field full">
              <label for="nome">Nome Completo</label>
              <input type="text" id="nome" placeholder="ex.: Maria Silva">
            </div>

            <div class="field">
              <label for="cpf">CPF</label>
              <input type="text" id="cpf" inputmode="numeric" maxlength="14" placeholder="NNN.NNN.NNN-NN">
            </div>

            <div class="field">
              <label for="nasc">Data de Nascimento</label>
              <input type="date" id="nasc">
            </div>

            <div class="field">
              <label for="tel">Telefone / WhatsApp (opcional)</label>
              <input type="tel" id="tel" placeholder="(21) 99988-7766">
            </div>

            <div class="field">
              <label for="escolaridade">Escolaridade</label>
              <select id="escolaridade">
                <option value="1inc">1º grau incompleto</option>
                <option value="1comp">1º grau completo</option>
                <option value="2comp" selected>2º grau completo</option>
                <option value="superior">nível superior</option>
                <option value="pos">pós-graduado</option>
              </select>
            </div>

            <div class="field full">
              <label>Estado Civil</label>
              <div class="radio-group">
                <label><input type="radio" name="civil" value="solteiro" checked> Solteiro(a)</label>
                <label><input type="radio" name="civil" value="casado"> Casado(a)</label>
                <label><input type="radio" name="civil" value="divorciado"> Divorciado(a)</label>
                <label><input type="radio" name="civil" value="viuvo"> Viúvo(a)</label>
              </div>
            </div>
          </div>

          <div class="actions">
            <button type="button" id="btn-incluir">Incluir</button>
            <button type="button" id="btn-limpar">Limpar</button>
            <button type="button" id="btn-voltar">Voltar</button>
          </div>

          <div id="msg" class="msg-box" role="status" aria-live="polite">// aguardando entrada&hellip;</div>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p class="footer-bottom">Copyright &copy; 1998–2026 demetrius&amp;co. Seus dados são criptografados e armazenados conforme LGPD.</p>
    </div>
  </footer>

  <script src="js/auth.js"></script>
  <script src="js/validators.js"></script>
  <script src="js/cadastro.js"></script>
</body>
</html>
